heat_template_version: 2018-08-31

description: >
  Úloha 6: Verzia bez explicitného enable_snat (rieši Forbidden error).
  DNS a Porty zostávajú zachované pre správnu inštaláciu služieb.

parameters:
  external_net:
    type: string
    default: ext-net-154

resources:
  # -------------------------------------------------------
  # 1. SIEŤOVÁ INFRAŠTRUKTÚRA
  # -------------------------------------------------------
  router:
    type: OS::Neutron::Router
    properties:
      name: router-uloha6
      external_gateway_info:
        network: { get_param: external_net }
        # Odstránené enable_snat, ktoré spôsobovalo Forbidden

  internal_net:
    type: OS::Neutron::Net
    properties:
      name: net-uloha6

  internal_subnet:
    type: OS::Neutron::Subnet
    properties:
      name: subnet-uloha6
      network_id: { get_resource: internal_net }
      cidr: 10.0.0.0/24
      gateway_ip: 10.0.0.1
      dns_nameservers: [ 8.8.8.8, 1.1.1.1 ]

  router_if:
    type: OS::Neutron::RouterInterface
    properties:
      router_id: { get_resource: router }
      subnet_id: { get_resource: internal_subnet }

  # -------------------------------------------------------
  # 2. SECURITY GROUPS
  # -------------------------------------------------------
  sg_jump:
    type: OS::Neutron::SecurityGroup
    properties:
      name: sg-jump
      rules:
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
        - protocol: icmp

  sg_app:
    type: OS::Neutron::SecurityGroup
    properties:
      name: sg-app
      rules:
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
        - protocol: tcp
          port_range_min: 80
          port_range_max: 80
        - protocol: icmp

  sg_proxy:
    type: OS::Neutron::SecurityGroup
    properties:
      name: sg-proxy
      rules:
        - protocol: tcp
          port_range_min: 3128
          port_range_max: 3128
        - protocol: icmp

  # -------------------------------------------------------
  # 3. VIRTUÁLNE STROJE A PORTY
  # -------------------------------------------------------

  jump_vm:
    type: OS::Nova::Server
    properties:
      name: jump-server
      image: debian-12-kis
      flavor: 1c1r10d
      networks:
        - network: { get_param: external_net }
        - network: { get_resource: internal_net }
      security_groups: [ { get_resource: sg_jump } ]

  app_vm:
    type: OS::Nova::Server
    properties:
      name: application-apache2
      image: debian-12-kis
      flavor: 1c1r10d
      networks:
        - port: { get_resource: app_port }
      user_data_format: RAW
      user_data: |
        #!/bin/bash
        apt-get update
        apt-get install -y apache2
        echo "<h1>Server Apache bezi na 10.0.0.25</h1>" > /var/www/html/index.html
        systemctl enable apache2
        systemctl start apache2

  app_port:
    type: OS::Neutron::Port
    properties:
      network_id: { get_resource: internal_net }
      fixed_ips: [{ ip_address: 10.0.0.25 }]
      security_groups: [ { get_resource: sg_app } ]

  proxy_vm:
    type: OS::Nova::Server
    properties:
      name: proxy-squid3
      image: debian-12-kis
      flavor: 1c1r10d
      networks:
        - port: { get_resource: proxy_port }
      user_data_format: RAW
      user_data: |
        #!/bin/bash
        apt-get update
        apt-get install -y squid
        sed -i 's/http_access deny all/http_access allow all/g' /etc/squid/squid.conf
        systemctl enable squid
        systemctl restart squid

  proxy_port:
    type: OS::Neutron::Port
    properties:
      network_id: { get_resource: internal_net }
      fixed_ips: [{ ip_address: 10.0.0.10 }]
      security_groups: [ { get_resource: sg_proxy } ]
heat_template_version: 2018-08-31

description: >
  Úloha 3: Jeden router prepájajúci dve siete (10.0.1.0/24 s jedným PC 
  a 172.16.99.0/24 s dvoma PC) so špecifickými bezpečnostnými pravidlami.

parameters:
  external_net:
    type: string
    default: ext-net-154

resources:

  # -------------------------------------------------------
  # 1. SIEŤOVÁ INFRAŠTRUKTÚRA (Router + 2x Net/Subnet)
  # -------------------------------------------------------

  router:
    type: OS::Neutron::Router
    properties:
      name: router-uloha3
      external_gateway_info:
        network: { get_param: external_net }

  # Sieť A (horná na obrázku) - 10.0.1.0/24
  net_a:
    type: OS::Neutron::Net
    properties:
      name: net-10-0-1

  subnet_a:
    type: OS::Neutron::Subnet
    properties:
      name: subnet-10-0-1
      network_id: { get_resource: net_a }
      cidr: 10.0.1.0/24
      gateway_ip: 10.0.1.1

  router_if_a:
    type: OS::Neutron::RouterInterface
    properties:
      router_id: { get_resource: router }
      subnet_id: { get_resource: subnet_a }

  # Sieť B (dolná na obrázku) - 172.16.99.0/24
  net_b:
    type: OS::Neutron::Net
    properties:
      name: net-172-16-99

  subnet_b:
    type: OS::Neutron::Subnet
    properties:
      name: subnet-172-16-99
      network_id: { get_resource: net_b }
      cidr: 172.16.99.0/24
      gateway_ip: 172.16.99.1

  router_if_b:
    type: OS::Neutron::RouterInterface
    properties:
      router_id: { get_resource: router }
      subnet_id: { get_resource: subnet_b }

  # -------------------------------------------------------
  # 2. SECURITY GROUPS
  # -------------------------------------------------------

  sec_group_main:
    type: OS::Neutron::SecurityGroup
    properties:
      name: sg-uloha3
      rules:
        # Povoľ ICMP
        - protocol: icmp
        
        # Povoľ SSH (22) a RDP (3389) všade
        - protocol: tcp
          port_range_min: 22
          port_range_max: 22
        - protocol: tcp
          port_range_min: 3389
          port_range_max: 3389

        # Povoľ HTTP/s a DNS len z UNIZA siete
        - protocol: tcp
          port_range_min: 80
          port_range_max: 80
          remote_ip_prefix: 158.193.0.0/16
        - protocol: tcp
          port_range_min: 443
          port_range_max: 443
          remote_ip_prefix: 158.193.0.0/16
        - protocol: udp
          port_range_min: 53
          port_range_max: 53
          remote_ip_prefix: 158.193.0.0/16
        - protocol: tcp
          port_range_min: 53
          port_range_max: 53
          remote_ip_prefix: 158.193.0.0/16

        # Povoľ komunikáciu medzi sieťami (všetky protokoly)
        # Vynechaním 'protocol' Neutron povolí všetky protokoly z daného prefixu
        - remote_ip_prefix: 10.0.1.0/24
        - remote_ip_prefix: 172.16.99.0/24

  # -------------------------------------------------------
  # 3. VIRTUÁLNE STROJE (PC1 v hornom, PC2 a PC3 v dolnom)
  # -------------------------------------------------------

  pc1:
    type: OS::Nova::Server
    properties:
      name: pc1
      image: cirros
      flavor: 1c05r1d
      availability_zone: nova
      networks:
        - network: { get_resource: net_a }
      security_groups: [ { get_resource: sec_group_main } ]

  pc2:
    type: OS::Nova::Server
    properties:
      name: pc2
      image: cirros
      flavor: 1c05r1d
      availability_zone: nova
      networks:
        - network: { get_resource: net_b }
      security_groups: [ { get_resource: sec_group_main } ]

  pc3:
    type: OS::Nova::Server
    properties:
      name: pc3
      image: cirros
      flavor: 1c05r1d
      availability_zone: nova
      networks:
        - network: { get_resource: net_b }
      security_groups: [ { get_resource: sec_group_main } ]